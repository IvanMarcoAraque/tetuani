<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Tetuani</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <h1>TETU<span>ANI</span></h1>
        <p>Contáctanos</p>
        <a href="index.html" class="back-btn">← Volver al Inicio</a>
    </header>

    <div class="container">
        <section class="info-contacto">
            <div class="contact-box">
                <div class="contact-info">
                    <h2>Información de <span>Contacto</span></h2>
                    <div class="data">
                        <p>📍 Calle Ejemplo 123, Ciudad</p>
                        <p>📞 +34 697 242 656</p>
                        <p>📧 info@tetuani.com</p>
                        <p>🕒 Lunes-Domingo: 12:00 - 00:00</p>
                    </div>
                </div>
                <div class="map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3153.835434509374!2d-122.419415484681!3d37.774929779759!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x8085808c0c0c0c0%3A0x0!2zMzcuNzc0OTI5NzY!5e0!3m2!1ses!2ses!4v1630000000000!5m2!1ses!2ses" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </section>

        <section class="contact-form">
            <h2 class="section-title">Envíanos un <span>Mensaje</span></h2>
            <form action="#" method="post">
                <div class="form-group">
                    <label for="name">Nombre</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="form-group">
                    <label for="message">Mensaje</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="btn-main">Enviar Mensaje</button>
            </form>
        </section>
    </div>

    <a href="https://wa.me/34697242656?text=¡Hola!%20Quiero%20hacer%20un%20pedido%20en%20Tetuani%20🍔" class="floating-btn" target="_blank">
        <span style="font-size: 1.8rem;">📱</span>
    </a>

    <button class="back-to-top" aria-label="Volver arriba" title="Volver arriba">↑</button>

    <script>
        const backToTop = document.querySelector('.back-to-top');
        window.addEventListener('scroll', () => {
            if (window.scrollY > 250) {
                backToTop.classList.add('show');
            } else {
                backToTop.classList.remove('show');
            }
        });
        backToTop.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    </script>

    <footer>
        <p>© 2026 Tetuani. Desarrollado por Iván Marco.</p>
    </footer>
</body>
</html>
